    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system and ROS dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-rosdep \
            ros-jazzy-cv-bridge \
            ros-jazzy-image-transport

      - name: Create workspace and copy source
        run: |
          mkdir -p /home/ros_ws/src
          cp -r $GITHUB_WORKSPACE/src/mobile /home/ros_ws/src/

      - name: Build package
        run: |
          cd /home/ros_ws
          . /opt/ros/jazzy/setup.bash
          colcon build --packages-select mobile

      - name: Run tests
        run: |
          cd /home/ros_ws
          . install/setup.bash
          colcon test --packages-select mobile
          colcon test-result --verbose